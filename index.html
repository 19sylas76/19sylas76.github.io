<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Myles Russell</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b0c10;
  color: #eaeaea;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: #0f141b;
  border-bottom: 1px solid #1b2230;
}

.nav a {
  color: #eaeaea;
  margin-left: 14px;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.8;
}

/* WRAP */
.wrap {
  max-width: 1100px;
  margin: auto;
  padding: 24px;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-top: 20px;
}

.hero-main {
  background: #121826;
  padding: 22px;
}

.hero-side {
  display: grid;
  gap: 12px;
}

.box {
  background: #121826;
  padding: 16px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 16px;
}

/* BLOG */
.blog {
  margin-top: 30px;
}

.post {
  padding: 14px 0;
  border-bottom: 1px solid #1b2230;
}

/* SECTION LABEL */
.label {
  font-size: 12px;
  opacity: 0.5;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* NOW */
.now {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid #1b2230;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.4;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div><strong>Myles Russell</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Blog</a>
    <a href="#">Books</a>
    <a href="#">Building</a>
    <a href="#">Tavern</a>
  </div>
</div>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">

    <div class="hero-main">
      <div class="label">FEATURED</div>
      <h2>Main Story Area</h2>
      <p>This is your main featured post or highlight.</p>
    </div>

    <div class="hero-side">
      <div class="box">Latest Blog</div>
      <div class="box">Books</div>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid">
    <div class="box">Building</div>
    <div class="box">Music</div>
    <div class="box">Gaming</div>
  </div>

  <!-- BLOG -->
  <div class="blog">
    <div class="label">BLOG</div>

    <div class="post">Post 1</div>
    <div class="post">Post 2</div>
    <div class="post">Post 3</div>
  </div>

  <!-- NOW -->
  <div class="now">
    <div class="label">NOW</div>
    <p>Short current status line goes here.</p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Built by Myles Russell
  </div>

</div>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Myles Russell</title>

<style>
body{
  margin:0;
  background:#0b0c10;
  color:#eaeaea;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

/* CENTER LAYOUT */
.wrap{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:left;
  padding:40px;
}

/* CONTENT BLOCK */
.box{
  max-width:700px;
}

/* NAME */
h1{
  font-size:48px;
  margin:0 0 10px;
  letter-spacing:-1px;
}

/* SUBTEXT */
p{
  font-size:18px;
  opacity:.75;
  line-height:1.6;
  margin:0 0 20px;
}

/* SMALL LINE */
.small{
  font-size:13px;
  opacity:.4;
  margin-top:30px;
}

/* LINK STYLE */
a{
  color:#60a5fa;
  text-decoration:none;
}
a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="box">

    <h1>Myles Russell</h1>

    <p>
      A personal site is coming soon.
    </p>

    <p>
      Writing, programming, music, games, books, and whatever else ends up here.
    </p>

    <p class="small">
      Currently under construction.
    </p>

  </div>
</div>

</body>
</html>
